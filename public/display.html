<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donation Coordination - Live Display</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Times New Roman', Georgia, serif;
      background: #e8e6dc;
      color: #141413;
      display: flex;
      flex-direction: column;
      padding: 3vh 4vw;
    }
    .header {
      text-align: center;
      margin-bottom: 1.5vh;
    }
    .header h1 {
      font-size: 4vh;
      font-weight: 400;
      letter-spacing: -0.01em;
      margin-bottom: 0.5vh;
    }
    .header .total {
      font-family: system-ui, sans-serif;
      font-size: 2.5vh;
      color: #30302e;
    }
    .legend {
      display: flex;
      justify-content: center;
      gap: 3vw;
      margin-bottom: 1.5vh;
      font-family: system-ui, sans-serif;
      font-size: 2vh;
    }
    .legend span {
      display: flex;
      align-items: center;
      gap: 0.8vw;
    }
    .legend .swatch {
      width: 2vh;
      height: 2vh;
      border-radius: 3px;
      display: inline-block;
    }
    .swatch-actual { background: #d97757; }
    .swatch-ideal { background: #16a34a; }
    .chart {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-evenly;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 2vw;
    }
    .row-label {
      width: 22vw;
      text-align: right;
      font-size: 2.5vh;
      flex-shrink: 0;
    }
    .row-bars {
      display: flex;
      flex-direction: column;
      gap: 0.3vh;
      width: 55vw;
    }
    .bar-row {
      display: flex;
      align-items: center;
      gap: 1vw;
    }
    .bar {
      height: 2.8vh;
      border-radius: 4px;
      transition: width 0.4s ease;
      min-width: 2px;
      flex-shrink: 0;
    }
    .bar-actual { background: #d97757; }
    .bar-ideal { background: #16a34a; }
    .bar-pct {
      font-family: system-ui, sans-serif;
      font-size: 2vh;
      color: #30302e;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Donation Coordination</h1>
    <div class="total"><span id="num-donors">0</span> donors | $<span id="total-amount">0</span> total</div>
  </div>
  <div class="legend">
    <span><span class="swatch swatch-actual"></span> Actual</span>
    <span><span class="swatch swatch-ideal"></span> Avg. Ideal</span>
  </div>
  <div class="chart" id="chart"></div>
  <script>
    if (window.innerWidth <= 600) {
      const base = window.location.pathname.replace(/display\.html.*$/, '');
      window.location.replace(base + 'app.html');
    }
  </script>
  <script src="display.js"></script>
</body>
</html>
