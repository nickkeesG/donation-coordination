<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donation Coordination - Live Display</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Times New Roman', Georgia, serif;
      background: #e8e6dc;
      color: #141413;
      display: flex;
      flex-direction: column;
      padding: 2.5vh 3vw;
    }
    .header {
      text-align: center;
      margin-bottom: 1vh;
    }
    .header h1 {
      font-size: 3.5vh;
      font-weight: 400;
      letter-spacing: -0.01em;
      margin-bottom: 0.3vh;
    }
    .header .total {
      font-family: system-ui, sans-serif;
      font-size: 2vh;
      color: #30302e;
    }
    .legend {
      display: flex;
      justify-content: center;
      gap: 3vw;
      margin-bottom: 1vh;
      font-family: system-ui, sans-serif;
      font-size: 1.8vh;
    }
    .legend span {
      display: flex;
      align-items: center;
      gap: 0.8vw;
    }
    .legend .swatch {
      width: 1.8vh;
      height: 1.8vh;
      border-radius: 3px;
      display: inline-block;
    }
    .swatch-actual { background: #d97757; }
    .swatch-ideal { background: #eda100; }

    /* Two-pane layout */
    .panes {
      flex: 1;
      display: flex;
      gap: 3vw;
      min-height: 0;
    }
    .pane {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .pane-title {
      font-family: system-ui, sans-serif;
      font-size: 2vh;
      font-weight: 600;
      color: #30302e;
      margin-bottom: 1vh;
      padding-bottom: 0.5vh;
      border-bottom: 2px solid rgba(20, 20, 19, 0.15);
    }
    .pane-chart {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-evenly;
    }

    /* Shared row styles */
    .row {
      display: flex;
      align-items: center;
      gap: 1vw;
    }
    .row-label {
      text-align: right;
      flex-shrink: 0;
      font-family: system-ui, sans-serif;
    }
    .row-bars {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.2vh;
    }
    .bar-row {
      display: flex;
      align-items: center;
      gap: 0.6vw;
    }
    .bar {
      border-radius: 3px;
      transition: width 0.4s ease;
      min-width: 2px;
      flex-shrink: 0;
    }
    .bar-actual { background: #d97757; }
    .bar-ideal { background: #eda100; }
    .bar-pct {
      font-family: system-ui, sans-serif;
      color: #30302e;
      white-space: nowrap;
    }

    /* Left pane: categories */
    .pane-categories .row-label {
      width: 11vw;
      font-size: 2.2vh;
      font-weight: 600;
    }
    .pane-categories .bar { height: 2.2vh; }
    .pane-categories .bar-pct { font-size: 1.8vh; }

    /* Right pane: individual funds */
    .pane-funds .row-label {
      width: 13vw;
      font-size: 1.7vh;
      font-weight: 400;
      color: #555;
    }
    .pane-funds .bar { height: 1.6vh; }
    .pane-funds .bar-pct { font-size: 1.4vh; }

    /* Divider between panes */
    .pane-divider {
      width: 1px;
      background: rgba(20, 20, 19, 0.15);
      align-self: stretch;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Donation Coordination</h1>
    <div class="total"><span id="num-donors">0</span> donors | $<span id="total-amount">0</span> total</div>
  </div>
  <div class="legend">
    <span><span class="swatch swatch-actual"></span> Actual</span>
    <span><span class="swatch swatch-ideal"></span> Avg. Ideal</span>
  </div>
  <div class="panes">
    <div class="pane pane-categories">
      <div class="pane-title">By Category</div>
      <div class="pane-chart" id="chart-categories"></div>
    </div>
    <div class="pane-divider"></div>
    <div class="pane pane-funds">
      <div class="pane-title">By Fund</div>
      <div class="pane-chart" id="chart-funds"></div>
    </div>
  </div>
  <script>
    if (window.innerWidth <= 600) {
      const base = window.location.pathname.replace(/display\.html.*$/, '');
      window.location.replace(base + 'app.html');
    }
  </script>
  <script src="display.js"></script>
</body>
</html>
